<!doctype html>
<html>
  <head>
    <title>在线工具箱</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="免费在线工具箱，提供PDF处理、图片压缩、格式转换、视频处理等多种实用工具"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <style>
      /* 防止页面刷新时白屏的初始样式 */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #070707;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
          
          // 从 localStorage 读取网站设置
          const siteSettings = localStorage.getItem('site_settings')
          if (siteSettings) {
            const settings = JSON.parse(siteSettings)
            if (settings.basic && settings.basic.siteName) {
              document.title = settings.basic.siteName
            }
            // 应用自定义 favicon
            if (settings.basic && settings.basic.favicon) {
              const existingIcon = document.querySelector('link[rel="icon"]')
              if (existingIcon) {
                existingIcon.href = settings.basic.favicon
              }
            }
          }
        } catch (e) {
          console.warn('Failed to apply initial settings:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
