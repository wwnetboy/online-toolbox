# Nginx 配置文件 - 优化版
# 修复了静态资源缓存和加载速度问题

server {
    # HTTPS 端口
    listen 443 ssl http2;
    
    # 【必须修改】你的域名
    server_name tool.isww.cn;
    
    # 【必须修改】SSL 证书路径（宝塔面板申请后自动配置）
    ssl_certificate /www/server/panel/vhost/cert/tool.isww.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/tool.isww.cn/privkey.pem;
    
    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 【必须修改】前端静态文件目录
    root /www/wwwroot/toolbox/web;
    index index.html index.htm;
    
    # 字符集
    charset utf-8;
    
    # 访问日志
    access_log /www/wwwroot/toolbox/web/nginx_access.log;
    error_log /www/wwwroot/toolbox/web/nginx_error.log;
    
    # ==================== Gzip 压缩（关键优化）====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_disable "MSIE [1-6]\.";  # 禁用旧版 IE
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        application/font-woff
        application/font-woff2;
    
    # ==================== 静态资源缓存（关键优化）====================
    # 注意：这些规则必须放在 location / 之前！
    
    # JavaScript 和 CSS（带 hash 的文件可以永久缓存）
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # 确保 gzip 生效
        gzip_static on;
    }
    
    # 图片资源
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 字体文件
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    
    # 媒体文件
    location ~* \.(mp4|mp3|webm|ogg|avi|mov)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # HTML 文件不缓存（确保能获取最新版本）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    
    # ==================== API 反向代理 ====================
    location /api/ {
        # 代理到后端服务
        proxy_pass http://127.0.0.1:3006;
        
        # HTTP 版本
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 缓存控制
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 错误处理
        proxy_intercept_errors off;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }
    
    # ==================== 上传文件访问 ====================
    location /uploads/ {
        alias /www/wwwroot/toolbox/backend/uploads/;
        expires 1y;
        add_header Cache-Control "public";
        
        # 安全限制：只允许访问特定类型的文件
        location ~* \.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx)$ {
            # 允许访问
        }
        
        # 禁止访问其他类型文件
        location ~* \.(php|jsp|asp|sh|bash)$ {
            deny all;
        }
    }
    
    # ==================== 前端路由支持 ====================
    # 注意：这个必须放在最后，作为兜底规则
    location / {
        try_files $uri $uri/ /index.html;
        
        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    
    # ==================== 安全配置 ====================
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问配置文件
    location ~ \.(env|git|gitignore|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 限制请求方法
    limit_except GET HEAD POST PUT DELETE OPTIONS PATCH {
        deny all;
    }
    
    # ==================== 上传大小限制 ====================
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # ==================== 超时设置 ====================
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;
    
    # ==================== 连接限制 ====================
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # ==================== 错误页面 ====================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /www/wwwroot/toolbox/web;
    }
}

# ==================== HTTP 强制重定向到 HTTPS ====================
# 推荐启用，提升安全性和 SEO
server {
    listen 80;
    server_name tool.isww.cn;
    return 301 https://$server_name$request_uri;
}
